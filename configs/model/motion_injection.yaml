# Motion injection layers: evenly spaced across the 42-block DiT backbone
# Per CLAUDE.md spec: layers [0, 10, 20, 30]
motion_layers: [0, 10, 20, 30]

# Number of attention heads for motion injection (-1 = all heads = H_heads = 48)
n_motion_heads: -1
H_m_fraction: 1.0

# Sigmoid gating temperatures for region maps
tau_m: 0.1   # high-motion region threshold
tau_e: 0.1   # edge region threshold
